version: "3.9"

networks:
  raft-net:
    driver: bridge

services:
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    networks:
      - raft-net
    environment:
      - REPLICAS=http://replica1:4001,http://replica2:4002,http://replica3:4003
    depends_on:
      - replica1
      - replica2
      - replica3
    volumes:
      - ./gateway/src:/app/src

  replica1:
    build: ./replica1
    container_name: replica1
    ports:
      - "4001:4001"
    networks:
      - raft-net
    environment:
      - REPLICA_ID=replica1
      - PORT=4001
      - PEERS=http://replica2:4002,http://replica3:4003
    volumes:
      - ./replica1/src:/app/src

  replica2:
    build: ./replica2
    container_name: replica2
    ports:
      - "4002:4002"
    networks:
      - raft-net
    environment:
      - REPLICA_ID=replica2
      - PORT=4002
      - PEERS=http://replica1:4001,http://replica3:4003
    volumes:
      - ./replica2/src:/app/src

  replica3:
    build: ./replica3
    container_name: replica3
    ports:
      - "4003:4003"
    networks:
      - raft-net
    environment:
      - REPLICA_ID=replica3
      - PORT=4003
      - PEERS=http://replica1:4001,http://replica2:4002
    volumes:
      - ./replica3/src:/app/src