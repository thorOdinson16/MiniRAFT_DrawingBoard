networks:
  raft-net:
    driver: bridge

services:

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "3000:80"
    networks:
      - raft-net
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy

  # ── Gateway ──────────────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - raft-net
    environment:
      - REPLICAS=http://replica1:4001,http://replica2:4002,http://replica3:4003
    volumes:
      - ./gateway/src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 15s
    depends_on:
      replica1:
        condition: service_healthy
      replica2:
        condition: service_healthy
      replica3:
        condition: service_healthy

  # ── Replica 1 ────────────────────────────────────────────────────────────────
  replica1:
    build: ./replica1
    container_name: replica1
    ports:
      - "4001:4001"
    networks:
      - raft-net
    environment:
      - REPLICA_ID=replica1
      - PORT=4001
      - PEERS=http://replica2:4002,http://replica3:4003
    volumes:
      - ./replica1/src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/status"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 15s

  # ── Replica 2 ────────────────────────────────────────────────────────────────
  replica2:
    build: ./replica2
    container_name: replica2
    ports:
      - "4002:4002"
    networks:
      - raft-net
    environment:
      - REPLICA_ID=replica2
      - PORT=4002
      - PEERS=http://replica1:4001,http://replica3:4003
    volumes:
      - ./replica2/src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/status"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 15s

  # ── Replica 3 ────────────────────────────────────────────────────────────────
  replica3:
    build: ./replica3
    container_name: replica3
    ports:
      - "4003:4003"
    networks:
      - raft-net
    environment:
      - REPLICA_ID=replica3
      - PORT=4003
      - PEERS=http://replica1:4001,http://replica2:4002
    volumes:
      - ./replica3/src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4003/status"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 15s
